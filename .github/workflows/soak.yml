name: Windows soak and resource bounds

on:
  schedule:
    - cron: '29 2 * * 6'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soak:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Validate and restore
        shell: pwsh
        run: |
          .\tools\validate-repository.ps1
          dotnet restore .\CaYaFix.sln
      - name: Build with warnings as errors
        run: dotnet build .\CaYaFix.sln -c Release --no-restore -warnaserror
      - name: Run 50 isolated test processes with resource ceilings
        shell: pwsh
        run: .\tools\soak-test.ps1 -Iterations 50 -NoBuild
      - name: Upload soak evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-results
          path: TestResults/Soak/**
          if-no-files-found: warn
          retention-days: 30
