name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Validate, restore, build, and test
        shell: pwsh
        run: |
          .\tools\validate-repository.ps1 -RequireScreenshots
          dotnet restore .\CaYaFix.sln
          dotnet build .\CaYaFix.sln -c Release --no-restore -warnaserror
          dotnet test .\CaYaFix.Tests\CaYaFix.Tests.csproj -c Release --no-build --blame-hang-timeout 5m

      - name: Publish self-contained Windows application
        shell: pwsh
        run: |
          dotnet publish .\CaYaFix.App\CaYaFix.App.csproj -c Release -r win-x64 --self-contained true -warnaserror -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false -o .\publish\win-x64
          Compress-Archive -Path .\publish\win-x64\* -DestinationPath .\CaYaFix-win-x64.zip -CompressionLevel Optimal
          $hash = (Get-FileHash .\CaYaFix-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  CaYaFix-win-x64.zip" | Set-Content -LiteralPath .\CaYaFix-win-x64.sha256 -Encoding ascii

      - name: Process-isolated release soak
        shell: pwsh
        run: .\tools\soak-test.ps1 -Iterations 10 -NoBuild

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" .\CaYaFix-win-x64.zip .\CaYaFix-win-x64.sha256 --verify-tag --generate-notes --title "CaYaFix ${{ github.ref_name }}"
